<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="./css/styles.css">
    <link rel="stylesheet" href="./css/risponsive.css">
    <title>FutPin</title>

</head>

<body>

    <div class="loading">
        <h2>Please Wait</h2>
        <br>
        <div class="circle"></div>
    </div>

    <div class="box_top">
        <h2>Footbal Team Creator</h2>
    </div>
    <br>
    <div class="boxes">
        <div class="box-Palyer">
            <h3>Enter number of Players</h3>
            <br>
            <div class="players_buts">
                <button id="p2">2 Players</button>
                <button id="p3">3 Players</button>
                <button id="p4">4 Players</button>
            </div>
        </div>
        <br>
        <div class="box-Palyer">
            <h3>Enter mode of playing</h3>
            <br>
            <div class="players_buts">
                <button id="R_m">Random</button>
                <button id="S_m">Selecting</button>
                <button id="RA_m">Random-Auto</button>
            </div>
        </div>
        <br>
        <div class="box-Palyer" id="nemecont">
            <h3>Enter Player names</h3>
            <br>
            <div class="nameBoxes">
                <div class="nameBox" id="name1">
                    <h5>Player 1</h5>
                    <input type="text" id="name1inp">
                </div>
                <div class="nameBox" id="name2">
                    <h5>Player 2</h5>
                    <input type="text" id="name2inp">
                </div>
                <div class="nameBox" id="name3">
                    <h5>Player 3</h5>
                    <input type="text" id="name3inp">
                </div>
                <div class="nameBox" id="name4">
                    <h5>Player 4</h5>
                    <input type="text" id="name4inp">
                </div>
            </div>
        </div>
        
    </div>
    <br>
    <div class="sub">
        <div class="bg_sub">
            <button id="submit">S U B M I T</button>
        </div>
    </div>
    <br>
    <br><br><br>
    <div class="creator"><h4>Created By PooryaRayati</h4></div>

    <audio id="adiuo" src="./music/stadum fans cheering.mp3" preload="auto"></audio>
    <script src="./js/game.js"></script>
</body>

</html>
